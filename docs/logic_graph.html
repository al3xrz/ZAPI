<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZAPI Logic Graph</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --ink: #1b2430;
      --muted: #5f6b7a;
      --line: #9aa8b6;
      --api: #d9ecff;
      --api-border: #6aa6de;
      --core: #e6f5df;
      --core-border: #7aae62;
      --data: #fff0cc;
      --data-border: #d7a737;
      --error: #ffe0e0;
      --error-border: #d66b6b;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 40px);
      line-height: 1.1;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      max-width: 820px;
      line-height: 1.55;
    }

    .surface {
      background: var(--panel);
      border: 1px solid #dde3ea;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      box-shadow: 0 10px 26px rgba(31, 42, 55, 0.08);
    }

    svg {
      display: block;
      min-width: 1040px;
      width: 100%;
      height: auto;
    }

    .box {
      rx: 8;
      ry: 8;
      stroke-width: 2;
    }

    .core {
      fill: var(--core);
      stroke: var(--core-border);
    }

    .api {
      fill: var(--api);
      stroke: var(--api-border);
    }

    .data {
      fill: var(--data);
      stroke: var(--data-border);
    }

    .error {
      fill: var(--error);
      stroke: var(--error-border);
    }

    .title {
      font-size: 17px;
      font-weight: 700;
      fill: var(--ink);
    }

    .text {
      font-size: 13px;
      fill: var(--muted);
    }

    .small {
      font-size: 12px;
      fill: var(--muted);
    }

    .arrow {
      stroke: var(--line);
      stroke-width: 2.2;
      fill: none;
      marker-end: url(#arrow);
    }

    .dash {
      stroke-dasharray: 7 6;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid;
      flex: 0 0 auto;
    }

    @media (max-width: 760px) {
      main {
        width: calc(100vw - 20px);
        padding-top: 18px;
      }

      .surface {
        padding: 10px;
      }

      .legend {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>ZAPI: схема логики работы</h1>
      <p class="lead">
        Поток показывает, как клиент проходит авторизацию, получает данные из
        JSON-RPC API Zabbix, централизованно обрабатывает ответы и собирает
        нормализованную структуру хостов для приложения.
      </p>
    </header>

    <section class="surface" aria-label="Схема логики ZAPI">
      <svg viewBox="0 0 1120 760" role="img" aria-labelledby="graphTitle graphDesc">
        <title id="graphTitle">ZAPI logic graph</title>
        <desc id="graphDesc">Диаграмма показывает основные классы, API-вызовы, обработку ошибок и нормализацию данных.</desc>

        <defs>
          <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
            <path d="M2,2 L10,6 L2,10 Z" fill="#9aa8b6"></path>
          </marker>
        </defs>

        <!-- Top row -->
        <rect class="box core" x="40" y="34" width="210" height="88"></rect>
        <text class="title" x="64" y="66">Zabbix(...)</text>
        <text class="text" x="64" y="91">url, username, password</text>
        <text class="text" x="64" y="110">item_transforms, flags</text>

        <rect class="box core" x="320" y="34" width="210" height="88"></rect>
        <text class="title" x="344" y="66">login()</text>
        <text class="text" x="344" y="91">user.login</text>
        <text class="text" x="344" y="110">сохраняет api_key</text>

        <rect class="box data" x="600" y="34" width="230" height="88"></rect>
        <text class="title" x="624" y="66">get_zabbix_result()</text>
        <text class="text" x="624" y="91">result -> вернуть данные</text>
        <text class="text" x="624" y="110">error -> ZabbixAPIError</text>

        <rect class="box error" x="900" y="34" width="180" height="88"></rect>
        <text class="title" x="924" y="66">exceptions</text>
        <text class="text" x="924" y="91">message</text>
        <text class="text" x="924" y="110">context, explanation</text>

        <path class="arrow" d="M250 78 H320"></path>
        <path class="arrow" d="M530 78 H600"></path>
        <path class="arrow dash" d="M830 78 H900"></path>

        <!-- Group info center -->
        <rect class="box core" x="390" y="185" width="340" height="86"></rect>
        <text class="title" x="430" y="218">get_group_info(group_name)</text>
        <text class="text" x="430" y="242">главный сценарий агрегации данных группы</text>

        <path class="arrow" d="M425 122 V185"></path>

        <!-- API fan-out -->
        <rect class="box api" x="40" y="345" width="200" height="82"></rect>
        <text class="title" x="64" y="377">hostgroup.get</text>
        <text class="text" x="64" y="402">get_group_id()</text>

        <rect class="box api" x="260" y="345" width="200" height="82"></rect>
        <text class="title" x="284" y="377">host.get</text>
        <text class="text" x="284" y="402">hosts + items + tags</text>

        <rect class="box api" x="480" y="345" width="200" height="82"></rect>
        <text class="title" x="504" y="377">trigger.get</text>
        <text class="text" x="504" y="402">активные триггеры</text>

        <rect class="box api" x="700" y="345" width="200" height="82"></rect>
        <text class="title" x="724" y="377">problem.get</text>
        <text class="text" x="724" y="402">текущие проблемы</text>

        <rect class="box api" x="920" y="345" width="160" height="82"></rect>
        <text class="title" x="944" y="377">script.get</text>
        <text class="text" x="944" y="402">скрипты группы</text>

        <path class="arrow" d="M500 271 C430 300 250 305 140 345"></path>
        <path class="arrow" d="M530 271 C470 305 410 312 360 345"></path>
        <path class="arrow" d="M560 271 V345"></path>
        <path class="arrow" d="M590 271 C650 305 730 312 800 345"></path>
        <path class="arrow" d="M620 271 C720 300 910 305 1000 345"></path>

        <path class="arrow dash" d="M240 386 H260"></path>
        <path class="arrow dash" d="M460 386 H480"></path>
        <path class="arrow dash" d="M680 386 H700"></path>
        <path class="arrow dash" d="M900 386 H920"></path>

        <!-- Join and normalize -->
        <rect class="box data" x="285" y="505" width="250" height="94"></rect>
        <text class="title" x="312" y="538">Связать данные</text>
        <text class="text" x="312" y="563">problem.objectid -> triggerid</text>
        <text class="text" x="312" y="584">trigger.hostid -> host.hostid</text>

        <rect class="box core" x="610" y="505" width="250" height="94"></rect>
        <text class="title" x="637" y="538">normalize_host()</text>
        <text class="text" x="637" y="563">interfaces, tags, problems</text>
        <text class="text" x="637" y="584">items, macros, inventory</text>

        <path class="arrow" d="M360 427 C360 462 380 475 410 505"></path>
        <path class="arrow" d="M580 427 C580 462 500 475 460 505"></path>
        <path class="arrow" d="M800 427 C800 462 550 475 485 505"></path>
        <path class="arrow" d="M1000 427 C1000 472 820 485 760 505"></path>
        <path class="arrow" d="M535 552 H610"></path>

        <!-- Item normalization -->
        <rect class="box data" x="120" y="645" width="250" height="78"></rect>
        <text class="title" x="146" y="677">private item filter</text>
        <text class="text" x="146" y="702">ignore_private_items=True</text>

        <rect class="box data" x="435" y="645" width="250" height="78"></rect>
        <text class="title" x="461" y="677">normalize_items()</text>
        <text class="text" x="461" y="702">number, on_off, duration</text>

        <rect class="box core" x="750" y="645" width="250" height="78"></rect>
        <text class="title" x="776" y="677">list[dict]</text>
        <text class="text" x="776" y="702">готовый ответ приложения</text>

        <path class="arrow" d="M680 599 C570 630 395 620 245 645"></path>
        <path class="arrow" d="M370 684 H435"></path>
        <path class="arrow" d="M685 684 H750"></path>

        <!-- Notes -->
        <text class="small" x="42" y="744">Сплошные линии: основной поток. Пунктир: общий разбор ответа и возможный переход к ошибкам.</text>
      </svg>
    </section>

    <section class="legend" aria-label="Легенда">
      <div class="legend-item">
        <span class="swatch" style="background:#e6f5df;border-color:#7aae62"></span>
        <span>Код пакета</span>
      </div>
      <div class="legend-item">
        <span class="swatch" style="background:#d9ecff;border-color:#6aa6de"></span>
        <span>JSON-RPC API Zabbix</span>
      </div>
      <div class="legend-item">
        <span class="swatch" style="background:#fff0cc;border-color:#d7a737"></span>
        <span>Данные и нормализация</span>
      </div>
      <div class="legend-item">
        <span class="swatch" style="background:#ffe0e0;border-color:#d66b6b"></span>
        <span>Ошибки</span>
      </div>
    </section>
  </main>
</body>
</html>
